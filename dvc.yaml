# =============================================================================
# dvc.yaml — DAG reprodutível do pipeline (raw -> processed -> modelo -> avaliação).
# Rode com: dvc repro
# =============================================================================
stages:
  preprocess:
    cmd: python -m src.main preprocess
    deps:
      - src/pipelines/preprocessing.py
      - src/data
      - src/preprocessing
      - data/raw/creditcard.csv
      - configs/config.yaml
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet

  train:
    cmd: python -m src.main train --model xgboost
    deps:
      - src/pipelines/training.py
      - src/training
      - src/models
      - data/processed/train.parquet
      - data/processed/val.parquet
      - configs/config.yaml
      - configs/model_params.yaml
    outs:
      - models/fraud_model.joblib
    metrics:
      - reports/metrics.json:
          cache: false

  evaluate:
    cmd: python -m src.main evaluate
    deps:
      - src/pipelines/evaluation.py
      - src/evaluation
      - models/fraud_model.joblib
      - data/processed/test.parquet
    metrics:
      - reports/test_metrics.json:
          cache: false
    plots:
      - reports/figures/pr_curve.png
      - reports/figures/roc_curve.png
      - reports/figures/confusion_matrix.png
