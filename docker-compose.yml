# =============================================================================
# docker-compose.yml — orquestra a API de inferência e o servidor MLflow.
# =============================================================================
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-deteccao-fraude:latest
    container_name: fraude-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: fraude-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlartifacts
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    restart: unless-stopped
