# =============================================================================
# model_params.yaml — Hiperparâmetros de treino e avaliação.
# Validados por src/config/settings.py (Pydantic) na inicialização.
# =============================================================================

# Baseline interpretável (referência obrigatória antes de modelos complexos)
logistic_regression:
  C: 1.0
  max_iter: 1000
  class_weight: "balanced"
  solver: "lbfgs"

# Modelo principal — XGBoost
xgboost:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 1.0
  reg_lambda: 1.0
  reg_alpha: 0.0
  tree_method: "hist"        # troque para "gpu_hist" se houver GPU
  eval_metric: "aucpr"       # otimiza PR-AUC, coerente com a métrica principal
  # scale_pos_weight é calculado em tempo de treino (n_neg / n_pos) quando
  # imbalance.strategy == "scale_pos_weight".
